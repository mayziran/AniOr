name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的标签时触发，如 v1.0.0
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'  # 缓存 pip 依赖，加速构建
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pyqt5

    - name: 生成 Qt 资源文件
      run: |
        cd resources
        pyrcc5 -o icon_rc.py icon.qrc
      shell: cmd

    - name: 编译 EXE
      run: |
        pyinstaller AniOr.spec --clean --noconfirm
      shell: cmd
      
    - name: 检查输出
      run: |
        dir dist
        if exist dist\AniOr.exe (
          echo "EXE 编译成功"
          for %%A in (dist\AniOr.exe) do echo "文件大小：%%~zA 字节"
        ) else (
          echo "EXE 编译失败"
          exit /b 1
        )
      shell: cmd
      
    - name: 创建 Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/AniOr.exe
        draft: false
        prerelease: false
        generate_release_notes: true
        fail_on_unmatched_files: true
        
    - name: 上传构建产物（手动触发时）
      uses: actions/upload-artifact@v4
      if: github.event_name == 'workflow_dispatch'
      with:
        name: AniOr
        path: dist/AniOr.exe
        retention-days: 30
        compression-level: 9
